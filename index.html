<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Freshelf</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<main>
  <header>
    <div class="header-left">
      <h1>Freshelf</h1>
      <p>Controle simples de perecíveis.</p>
      <p id="stats">Carregando estatísticas…</p>
    </div>
    <p id="app-feedback" class="feedback-banner" hidden aria-live="polite"></p>
  </header>

  <section class="content-grid">
    <section>
      <div>
        <h2>Novo produto</h2>
      </div>

      <form id="form-produto">
        <label>Nome <input id="nome" maxlength="100" required /></label>
        <label>Quantidade <input id="quantidade" type="number" min="0" required /></label>
        <label>Data de Validade <input id="data_validade" type="date" required /></label>
        <button id="submit-produto" type="submit">Cadastrar</button>
      </form>
    </section>

    <section>
      <div>
        <h2>Alertas de vencimento</h2>
      </div>
      <div id="alertas-lista" class="alertas-grid">Carregando…</div>
    </section>
  </section>

  <section>
    <div>
      <h2>Todos os produtos</h2>
    </div>
    <div id="lista-produtos" class="table-wrap">Carregando…</div>
  </section>
</main>

<script src="app.js"></script>
</body>
</html>
